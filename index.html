<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web3 Staking - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Web3 Staking DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://web3-staking-page.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#f7f4ee;
  --surface:#ffffff;
  --surface-soft:#fbfaf7;
  --ink:#171512;
  --muted:#6b655d;
  --faint:#9b948b;
  --line:rgba(23,21,18,.1);
  --line-strong:rgba(23,21,18,.17);
  --accent:#16B36A;
  --accent-soft:rgba(22,179,106,.11);
  --shadow:0 28px 70px -42px rgba(23,21,18,.42), 0 10px 26px -24px rgba(23,21,18,.32);
}

*{box-sizing:border-box}
html,body{min-height:100%;margin:0}
html{background:var(--bg)}
body{
  min-height:100dvh;
  overflow:hidden;
  color:var(--ink);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  line-height:1.5;
  background:
    radial-gradient(circle at 50% -10%, rgba(22,179,106,.12), transparent 34%),
    linear-gradient(180deg, #fbfaf7 0%, var(--bg) 58%, #f4efe7 100%);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  display:flex;
  flex-direction:column;
}

a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
h1,p{margin:0}
button{font:inherit}

.topbar{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:18px;
  width:100%;
  padding:18px clamp(18px,4vw,44px);
}

.brand{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-width:max-content;
  font-size:1rem;
  font-weight:750;
  letter-spacing:0;
}

.brand img{
  width:30px;
  height:30px;
  border-radius:9px;
  box-shadow:0 0 0 1px var(--line);
}

.nav{
  display:flex;
  align-items:center;
  gap:24px;
  margin-left:8px;
}

.nav a{
  color:var(--muted);
  font-size:.92rem;
  font-weight:550;
  white-space:nowrap;
  transition:color .18s ease;
}

.nav a:hover{color:var(--ink)}
.spacer{flex:1}

.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  padding:8px 16px;
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:rgba(255,255,255,.58);
  color:var(--ink);
  font-size:.9rem;
  font-weight:700;
  white-space:nowrap;
  box-shadow:0 12px 26px -24px rgba(23,21,18,.44);
  transition:border-color .18s ease,color .18s ease,transform .18s ease,background .18s ease;
}

.ghost:hover{
  color:var(--accent);
  border-color:rgba(22,179,106,.38);
  background:#fff;
  transform:translateY(-1px);
}

.stage{
  flex:1 1 auto;
  min-height:0;
  display:grid;
  place-items:center;
  align-content:center;
  gap:28px;
  width:100%;
  padding:12px clamp(18px,4vw,44px) 10px;
  text-align:center;
}

.hero{
  display:grid;
  justify-items:center;
  gap:14px;
}

h1{
  font-size:clamp(3rem,7vw,5.45rem);
  line-height:.98;
  font-weight:820;
  letter-spacing:0;
}

.sub{
  max-width:55ch;
  color:var(--muted);
  font-size:clamp(1rem,1.8vw,1.18rem);
}

.sub strong{
  color:var(--ink);
  font-weight:760;
  box-shadow:inset 0 -.45em 0 var(--accent-soft);
}

.app-card{
  width:min(520px,100%);
  display:grid;
  gap:17px;
  padding:20px;
  border:1px solid var(--line);
  border-radius:22px;
  background:linear-gradient(180deg,#fff 0%,var(--surface-soft) 100%);
  box-shadow:var(--shadow);
}

.card-head{
  display:flex;
  align-items:center;
  gap:12px;
  text-align:left;
}

.card-head img{
  flex:0 0 auto;
  width:42px;
  height:42px;
  border-radius:13px;
  box-shadow:0 0 0 1px var(--line);
}

.eyebrow{
  display:block;
  color:var(--faint);
  font-size:.72rem;
  font-weight:760;
  letter-spacing:.08em;
  line-height:1.1;
  text-transform:uppercase;
}

.card-title{
  margin-top:4px;
  color:var(--ink);
  font-size:1.02rem;
  font-weight:760;
  line-height:1.2;
}

.asset-row{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}

.asset{
  min-width:0;
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
  color:var(--muted);
  cursor:pointer;
  font-size:.98rem;
  font-weight:800;
  letter-spacing:0;
  transition:border-color .18s ease,box-shadow .18s ease,color .18s ease,transform .18s ease,background .18s ease;
}

.asset img{
  width:28px;
  height:28px;
  border-radius:50%;
  flex:0 0 auto;
}

.asset:hover,
.asset.is-active{
  color:var(--ink);
  border-color:rgba(22,179,106,.45);
  background:linear-gradient(180deg,#fff 0%,rgba(22,179,106,.08) 100%);
  box-shadow:inset 0 0 0 1px rgba(22,179,106,.16);
}

.asset:hover{transform:translateY(-1px)}

.primary{
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border-radius:16px;
  background:var(--accent);
  color:#fff;
  font-size:1.05rem;
  font-weight:820;
  box-shadow:0 18px 32px -22px rgba(22,179,106,.88);
  transition:transform .18s ease,box-shadow .18s ease,filter .18s ease;
}

.primary:hover{
  transform:translateY(-1px);
  filter:saturate(1.06) brightness(.98);
  box-shadow:0 22px 38px -22px rgba(22,179,106,.95);
}

.primary span{
  font-size:1.35rem;
  line-height:1;
}

.foot{
  flex:0 0 auto;
  padding:14px 20px 22px;
  color:var(--faint);
  font-size:.86rem;
  font-weight:560;
  text-align:center;
}

@media(max-width:760px){
  .topbar{padding:14px 18px;gap:12px}
  .nav{display:none}
  .brand{font-size:.96rem}
  .ghost{min-height:38px;padding:7px 13px;font-size:.86rem}
  .stage{gap:22px;padding:6px 18px 8px}
  h1{font-size:clamp(2.75rem,13.5vw,4.15rem)}
  .sub{max-width:31ch;font-size:1rem;line-height:1.45}
  .app-card{gap:14px;padding:16px;border-radius:20px}
  .card-head img{width:38px;height:38px;border-radius:12px}
  .card-title{font-size:.98rem}
  .asset-row{gap:8px}
  .asset{min-height:58px;flex-direction:column;gap:5px;font-size:.83rem;border-radius:14px}
  .asset img{width:26px;height:26px}
  .primary{min-height:52px;border-radius:14px}
  .foot{padding:10px 18px 16px;font-size:.82rem}
}

@media(max-width:380px){
  .topbar{padding-inline:14px}
  .brand span{max-width:118px;overflow:hidden;text-overflow:ellipsis}
  .ghost{padding-inline:11px}
  .stage{padding-inline:14px;gap:18px}
  .hero{gap:11px}
  .app-card{padding:14px}
  .asset{min-height:56px}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Web3 Staking</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Web3 Staking</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Web3 Staking &mdash; 2026</footer>
</body>
</html>
