<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web3 Staking</title>
  <meta name="description" content="Web3 Staking lets you stake supported assets on-chain and earn rewards in a fully self-custody Web3 environment.">
  <link rel="canonical" href="https://web3-staking-page.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F4EE">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Web3 Staking">
  <meta property="og:description" content="Web3 Staking lets you stake supported assets on-chain and earn rewards in a fully self-custody Web3 environment.">
  <meta property="og:url" content="https://web3-staking-page.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Web3 Staking">
  <meta name="twitter:description" content="Web3 Staking lets you stake supported assets on-chain and earn rewards in a fully self-custody Web3 environment.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://web3-staking-page.github.io/#website",
        "url": "https://web3-staking-page.github.io/",
        "name": "Web3 Staking",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://web3-staking-page.github.io/#organization",
        "name": "Web3 Staking",
        "url": "https://web3-staking-page.github.io/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://web3-staking-page.github.io/#app",
        "name": "Web3 Staking",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://web3-staking-page.github.io/"
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="dashboard/" rel="noopener noreferrer" aria-label="Web3 Staking">
      <img src="stakecrypto.png" width="30" height="30" alt="">
      <span>Web3 Staking</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://ethereum.org/staking/" target="_blank" rel="nofollow noopener noreferrer">Ethereum staking</a>
      <a href="https://www.kraken.com/learn/what-is-crypto-staking" target="_blank" rel="nofollow noopener noreferrer">Kraken learn</a>
      <a href="https://www.investopedia.com/how-to-stake-ethereum-7482623" target="_blank" rel="nofollow noopener noreferrer">Staking risks</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Web3 Staking</h1>
      <p class="sub"><strong>Web3 Staking</strong> lets you stake supported assets on-chain and earn rewards in a fully self-custody Web3 environment.</p>
    </section>

    <section class="app-card" aria-label="Stake selector">
      <div class="card-head">
        <img src="stakecrypto.png" width="42" height="42" alt="">
        <div>
          <span class="eyebrow">Choose an asset to stake</span>
          <p class="card-title">Self-custody staking entry</p>
        </div>
      </div>

      <div class="asset-row" role="group" aria-label="Choose an asset to stake">
        <button class="asset is-active" type="button" aria-pressed="true">
          <img src="eth.png" width="28" height="28" alt="">
          <span>ETH</span>
        </button>
        <button class="asset" type="button" aria-pressed="false">
          <img src="usdt.png" width="28" height="28" alt="">
          <span>USDT</span>
        </button>
        <button class="asset" type="button" aria-pressed="false">
          <img src="sol.png" width="28" height="28" alt="">
          <span>SOL</span>
        </button>
      </div>

      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&rsaquo;</span></a>
    </section>
  </main>

  <footer class="foot">Web3 Staking &mdash; 2026</footer>

  <script>
  (function(){
    "use strict";
    var assets = document.querySelectorAll(".asset");
    for (var i = 0; i < assets.length; i += 1) {
      assets[i].addEventListener("click", function(){
        for (var j = 0; j < assets.length; j += 1) {
          assets[j].classList.remove("is-active");
          assets[j].setAttribute("aria-pressed", "false");
        }
        this.classList.add("is-active");
        this.setAttribute("aria-pressed", "true");
      });
    }
  })();
  </script>
</body>
</html>
